name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a

      - name: Verify native interface
        run: |
          cmake -S . -B .tmp/native-build -G Ninja -DCMAKE_BUILD_TYPE=Debug
          cmake --build .tmp/native-build
          ctest --test-dir .tmp/native-build --output-on-failure

      - name: Build Android debug APK
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Generate SBOM
        run: |
          ./gradlew --no-daemon cyclonedxBom
          test -s build/reports/cyclonedx/bom.json
