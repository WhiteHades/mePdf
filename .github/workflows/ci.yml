name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "21.0.11+10.0.LTS"
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a

      - name: Verify native interface
        run: ./scripts/verify-native.sh

      - name: Build Android debug APK
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Verify SBOM and artifact correspondence
        run: |
          ./gradlew --no-daemon cyclonedxBom
          ./scripts/verify-artifact.sh
